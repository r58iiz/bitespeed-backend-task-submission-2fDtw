services:
  - type: web
    name: bitespeed-backend-task-2fDtw-api
    runtime: node
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bitespeed-backend-task-2fDtw-db
          property: connectionString
    region: oregon
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm run start

databases:
  - name: bitespeed-backend-task-2fDtw-db
    databaseName: prisma_db
    user: prisma_db_user
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
    postgresMajorVersion: "18"

version: "1"
